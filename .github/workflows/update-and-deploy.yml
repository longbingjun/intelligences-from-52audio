name: 爬虫更新数据 + 构建并部署静态站点

# 说明（今天在本地已验证过 scripts/crawl.py 与 scripts/build_site.py 可以正常跑通，
# 云端定时任务本身要等仓库真正推送到 GitHub、并在仓库 Settings -> Pages 里把
# "Source" 切换为 "GitHub Actions" 之后才会生效，这两步不在本次交付范围内，
# 详见 README「后续人工事项」一节）。
on:
  schedule:
    # 每天北京时间 09:10 跑一次（cron 用 UTC 时间，UTC 01:10 = 北京时间 09:10）
    - cron: "10 1 * * *"
  workflow_dispatch: {}
  push:
    branches: [main, master]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  crawl-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 运行爬虫，抓取最新拆解报告/视频
        run: python scripts/crawl.py --limit 30

      - name: 生成静态站点
        run: python scripts/build_site.py

      - name: 提交数据与站点变更（如有）
        run: |
          git config user.name "intel-bot"
          git config user.email "intel-bot@users.noreply.github.com"
          git add data/ site/
          git diff --cached --quiet || git commit -m "chore: 自动更新拆解数据与静态站点 [skip ci]"
          git push

      - name: 上传 site/ 作为 Pages 构建产物
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: crawl-and-build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

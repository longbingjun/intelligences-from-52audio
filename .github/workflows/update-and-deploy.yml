name: 爬虫更新数据 + 构建并部署静态站点

on:
  schedule:
    - cron: "10 1 * * *"
  workflow_dispatch:
    inputs:
      crawl_mode:
        description: daily=日更第1页；backfill-2026=补全2026年
        type: choice
        options:
          - daily
          - backfill-2026
        default: daily
  push:
    branches: [main, master]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  crawl-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 运行 v2 爬虫
        if: github.event_name != 'push'
        run: |
          MODE="${{ github.event.inputs.crawl_mode || 'daily' }}"
          python scripts/crawl_v2.py --mode "$MODE"

      - name: 生成静态站点
        run: python scripts/build_site.py

      - name: 上传 Pages 产物
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: 提交数据变更
        if: github.event_name != 'push'
        run: |
          git config user.name "intel-bot"
          git config user.email "intel-bot@users.noreply.github.com"
          git add data/ site/
          git diff --cached --quiet || git commit -m "chore: 自动更新情报数据 v2 [skip ci]"
          git pull --rebase origin master
          git push

  deploy:
    needs: crawl-and-build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment

name: 爬虫更新数据 + 构建并部署静态站点

on:
  schedule:
    - cron: "10 1 * * *"
  workflow_dispatch:
    inputs:
      crawl_mode:
        description: daily=日更首页；backfill-2026=补全2026年
        type: choice
        options:
          - daily
          - backfill-2026
        default: daily
      run_merge_ocr:
        description: 是否合并 OCR 结果到 BOM（较慢，默认 false）
        type: boolean
        default: false
  push:
    branches: [main, master]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  crawl-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package.json

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 运行 v2 爬虫
        if: github.event_name != 'push'
        run: |
          MODE="${{ github.event.inputs.crawl_mode || 'daily' }}"
          python scripts/crawl_v2.py --mode "$MODE"

      - name: 可选预处理（搜索索引 / 产品库 / 矩阵 / 信源标签）
        run: |
          for script in build_search_index build_products build_matrix tag_source_layer; do
            if [ -f "scripts/${script}.py" ]; then
              echo "Running scripts/${script}.py"
              python "scripts/${script}.py"
            fi
          done

      - name: 可选 OCR 合并（手动触发 workflow 时）
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.run_merge_ocr == 'true'
        run: python scripts/merge_ocr.py --all

      - name: 同步前端数据并构建站点
        run: |
          python scripts/prepare_web_data.py
          cd web
          npm install
          npm run build
          cd ..
          python scripts/generate_legacy_redirects.py
          touch site/.nojekyll

      - name: 上传 Pages 产物
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: 提交数据变更
        if: github.event_name != 'push'
        run: |
          git config user.name "intel-bot"
          git config user.email "intel-bot@users.noreply.github.com"
          git add data/ site/ web/public/data/
          git diff --cached --quiet || git commit --trailer "Co-authored-by: Cursor <cursoragent@cursor.com>" -m "chore: 自动更新情报数据 v2 [skip ci]"
          git pull --rebase --autostash origin master
          git push

  deploy:
    needs: crawl-and-build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 部署 GitHub Pages（失败自动重试）
        id: deployment
        uses: Wandalen/wretry.action@v3.5.0
        with:
          action: actions/deploy-pages@v4
          attempt_limit: 5
          attempt_delay: 45000